<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Core pixels</title>
     <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<style>
     body {
          background-image: url(bg_v2.gif);
          padding: 0;
          margin: 0;
          height: 99vh;
          background-size: cover;
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-position: -80px;
          overflow: hidden;
          font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
     }

     #p2 {
          transform: scaleX(-1);
     }

     #p1,
     #p2 {
          position: absolute;
     }

     .main {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: space-around;
          color: white;
     }

     .bar-bg {
          display: flex;
          width: 300px;
          height: 35px;
          background-color: gray;
          border: 2px solid white;
          border-radius: 20px;
     }

     #p1-bar,
     #p2-bar {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100%;
          background-color: rgb(25, 110, 25);
          transition: width 0.2s ease;
          border-radius: 20px;
          overflow: hidden;
     }

     .hc {
          display: flex;
          gap: 50px;
          align-self: flex-start;
          margin-top: 20px;
     }
</style>

<body>
     <div class="main">
          <div class="hc">
               <div class="bar-bg">
                    <div id="p1-bar" style="width: 100%;">
                         <p id="p1P">Good Man 100</p>
                    </div>
               </div>
               <a href="index.html"><img src="logo.png" alt="" width="90px" style="border-radius: 20px;"></a>
               <h1 style="text-shadow: 0 0 5px rgb(22, 22, 22); font-size: 50px;">FIGHT!!!</h1>
               <a href="index.html"><img src="logo.png" alt="" width="90px" style="border-radius: 20px;"></a>
               <div class="bar-bg">
                    <div id="p2-bar" style="width: 100%;">
                         <p id="p2P">Gunter 100</p>
                    </div>
               </div>
          </div>
          <img src="p1 stand.gif" alt="player 1" id="p1" width="200px" height="200px">
          <img src="p2 stand.gif" alt="player 1" id="p2" width="200px" height="200px">
     </div>
     <script src="app.js"></script>
</body>

</html>
